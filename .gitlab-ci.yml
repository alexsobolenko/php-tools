image: node:22-bookworm

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
    - when: never

stages:
  - test

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

test:
  stage: test
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm test
